  <title>Bundled Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FFFFFF; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #FFFFFF; z-index: 9999; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body { background: linear-gradient(140deg, #FFFFFF 0%, #F4F8FE 38%, #E3ECFB 72%, #D3E0F8 100%); background-attachment: fixed; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\n  a { color: #4D74D4; text-decoration: underline; text-underline-offset: 2px; }\n  a:hover { color: #264091; }\n  textarea { font-family: inherit; }\n  ::selection { background: #D6E0FF; }\n  @keyframes nmRise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }\n  @keyframes nmPop { 0% { opacity: 0; transform: scale(.94); } 60% { transform: scale(1.02); } 100% { opacity: 1; transform: scale(1); } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px 80px; font-family: 'Hanken Grotesk', system-ui, sans-serif; color: #101826;\">\n  <div style=\"width: 100%; max-width: 660px;\">\n\n    <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 22px;\">\n      <img src=\"7688d3fa-9ab0-486d-931d-42193459ee45\" alt=\"Nuomity\" style=\"height: 32px; width: auto; display: block;\">\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ done }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background: #FFFFFF; border: 1px solid #E7E8E6; border-radius: 22px; padding: 56px 44px; text-align: center; animation: nmPop .5s ease both;\">\n        <div style=\"width: 64px; height: 64px; border-radius: 20px; background: #4D74D4; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;\">\n          <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h2 style=\"font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 30px; line-height: 1.14; letter-spacing: -0.02em; margin: 0 0 14px; color: #264091;\">Ačiū! Tavo atsakymai jau pas mus.<\u002Fh2>\n        <p style=\"font-size: 16.5px; line-height: 1.6; color: #3D4756; margin: 0 auto; max-width: 430px;\">Tavo atsakymai padės mums geriau suprasti, kas nuomotojams svarbiausia ir kokiems „Nuomity“ sprendimams teikti didžiausią prioritetą.<\u002Fp>\n        <p style=\"font-size: 16.5px; line-height: 1.6; color: #3D4756; margin: 16px auto 0; max-width: 430px;\">Jei pažymėjai, kad nori prisidėti, netrukus su tavimi susisieksime.<\u002Fp>\n        <p style=\"font-size: 14px; color: #6B7585; margin: 28px 0 0; font-weight: 500;\">Mažiau rūpesčių. Daugiau aiškumo.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ active }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"animation: nmRise .5s ease both;\">\n\n      <div style=\"background: #FFFFFF; border: 1px solid #E7E8E6; border-radius: 22px; padding: 34px 34px 30px;\">\n        <h1 style=\"font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 27px; line-height: 1.16; letter-spacing: -0.02em; margin: 0 0 12px; color: #4D74D4;\">Kuriame Nuomity ir norime jį pritaikyti realiems nuomotojų poreikiams.<\u002Fh1>\n        <p style=\"font-size: 16px; line-height: 1.6; color: #3D4756; margin: 0;\"><strong style=\"color: #101826; font-weight: 600;\">5 trumpi klausimai, mažiau nei 2 minutės.<\u002Fstrong> Tavo atsakymai padės mums geriau suprasti, kas nuomotojams svarbiausia ir kokiems sprendimams teikti didžiausią prioritetą.<\u002Fp>\n        <div style=\"display: flex; align-items: center; gap: 12px; margin-top: 22px;\">\n          <div style=\"flex: 1; height: 6px; background: #E7E8E6; border-radius: 999px; overflow: hidden;\">\n            <div style=\"height: 100%; width: {{ progressPct }}; background: #4D74D4; border-radius: 999px; transition: width .35s cubic-bezier(.4,0,.2,1);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-size: 13px; font-weight: 600; color: #6B7585; white-space: nowrap;\">{{ answeredCount }} / 5<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Q1 -->\n      <div style=\"background: #FFFFFF; border: 1px solid #E7E8E6; border-radius: 22px; padding: 30px 34px; margin-top: 16px;\">\n        <div style=\"display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px;\">\n          <span style=\"font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 20px; line-height: 1.25; color: #4D74D4; letter-spacing: -0.01em;\">1.<\u002Fspan>\n          <h3 style=\"font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 20px; line-height: 1.25; letter-spacing: -0.01em; margin: 0; color: #101826;\">Kada paskutinį kartą ieškojai nuomininko savo būstui?<\u002Fh3>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 10px; margin-top: 18px;\">\n          <sc-for list=\"{{ q1opts }}\" as=\"opt\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ opt.onClick }}\" style=\"{{ opt.rowStyle }}\">\n              <div style=\"{{ opt.dotStyle }}\"><div style=\"{{ opt.dotInner }}\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"font-size: 15.5px; font-weight: 500;\">{{ opt.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Q2 -->\n      <div style=\"background: #FFFFFF; border: 1px solid #E7E8E6; border-radius: 22px; padding: 30px 34px; margin-top: 16px;\">\n        <div style=\"display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px;\">\n          <span style=\"font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 20px; line-height: 1.25; color: #4D74D4; letter-spacing: -0.01em;\">2.<\u002Fspan>\n          <h3 style=\"font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 20px; line-height: 1.25; letter-spacing: -0.01em; margin: 0; color: #101826;\">Prisimink paskutinį kartą, kai nuomojai. Kuri dalis atėmė daugiausiai laiko ar kėlė daugiausiai nerimo?<\u002Fh3>\n        <\u002Fdiv>\n        <p style=\"font-size: 14px; color: #6B7585; margin: 4px 0 16px; padding-left: 32px;\">Gali pažymėti kelis variantus.<\u002Fp>\n        <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n          <sc-for list=\"{{ q2opts }}\" as=\"opt\" hint-placeholder-count=\"10\">\n            <div onclick=\"{{ opt.onClick }}\" style=\"{{ opt.rowStyle }}\" data-comment-anchor=\"d0d1614b40-div\">\n              <div style=\"{{ opt.boxStyle }}\"><div style=\"{{ opt.checkStyle }}\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n              <span style=\"font-size: 15.5px; font-weight: 500;\">{{ opt.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ showQ2other }}\" hint-placeholder-val=\"{{ false }}\">\n            <input value=\"{{ q2other }}\" oninput=\"{{ onQ2other }}\" placeholder=\"Parašyk, kas tai buvo…\" style=\"width: 100%; border: 1.5px solid #E7E8E6; border-radius: 14px; padding: 13px 16px; font-size: 15.5px; color: #101826; background: #FBFBF9; outline: none;\" style-focus=\"border-color: #4D74D4; background: #FFFFFF;\">\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Q3 -->\n      <div style=\"background: #FFFFFF; border: 1px solid #E7E8E6; border-radius: 22px; padding: 30px 34px; margin-top: 16px;\">\n        <div style=\"display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px;\">\n          <span style=\"font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 20px; line-height: 1.25; color: #4D74D4; letter-spacing: -0.01em;\">3.<\u002Fspan>\n          <h3 style=\"font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 20px; line-height: 1.25; letter-spacing: -0.01em; margin: 0; color: #101826;\">Kaip užtikrintai jauteisi rinkdamasis galutinį nuomininką praėjusį kartą?<\u002Fh3>\n        <\u002Fdiv>\n        <div style=\"display: flex; gap: 8px; margin-top: 20px;\">\n          <sc-for list=\"{{ q3opts }}\" as=\"opt\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ opt.onClick }}\" style=\"{{ opt.cellStyle }}\">{{ opt.n }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display: flex; justify-content: space-between; margin-top: 10px; font-size: 12.5px; color: #6B7585; font-weight: 500;\">\n          <span>Visai neužtikrintai<\u002Fspan>\n          <span>Visiškai užtikrintai<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Q4 -->\n      <div style=\"background: #FFFFFF; border: 1px solid #E7E8E6; border-radius: 22px; padding: 30px 34px; margin-top: 16px;\">\n        <div style=\"display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px;\">\n          <span style=\"font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 20px; line-height: 1.25; color: #4D74D4; letter-spacing: -0.01em;\">4.<\u002Fspan>\n          <h3 style=\"font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 20px; line-height: 1.25; letter-spacing: -0.01em; margin: 0; color: #101826;\">Jei galėtum pakeisti vieną dalyką dabartiniame nuomos procese — kas tai būtų?<\u002Fh3>\n        <\u002Fdiv>\n        <p style=\"font-size: 14px; color: #6B7585; margin: 4px 0 16px; padding-left: 32px;\">Rašyk savais žodžiais, kaip pasakytum draugui.<\u002Fp>\n        <textarea value=\"{{ q4 }}\" oninput=\"{{ onQ4 }}\" placeholder=\"Pvz.: norėčiau iš karto matyti, ar žmogus tikrai gali sau leisti šią nuomą…\" rows=\"4\" style=\"width: 100%; border: 1.5px solid #E7E8E6; border-radius: 14px; padding: 14px 16px; font-size: 15.5px; line-height: 1.55; color: #101826; background: #FBFBF9; resize: vertical; min-height: 108px; max-height: 260px; outline: none;\" style-focus=\"border-color: #4D74D4; background: #FFFFFF;\"><\u002Ftextarea>\n      <\u002Fdiv>\n\n      <!-- Q5 -->\n      <div style=\"background: #FFFFFF; border: 1px solid #E7E8E6; border-radius: 22px; padding: 30px 34px; margin-top: 16px;\">\n        <div style=\"display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px;\">\n          <span style=\"font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 20px; line-height: 1.25; color: #4D74D4; letter-spacing: -0.01em;\">5.<\u002Fspan>\n          <h3 style=\"font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 20px; line-height: 1.25; letter-spacing: -0.01em; margin: 0; color: #101826;\">Kaip norėtum prisidėti toliau?<\u002Fh3>\n        <\u002Fdiv>\n        <p style=\"font-size: 14px; color: #6B7585; margin: 4px 0 16px; padding-left: 32px;\">Gali pažymėti kelis variantus.<\u002Fp>\n        <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n          <sc-for list=\"{{ q5opts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ opt.onClick }}\" style=\"{{ opt.rowStyle }}\">\n              <div style=\"{{ opt.boxStyle }}\"><div style=\"{{ opt.checkStyle }}\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n              <div>\n                <div style=\"font-size: 15.5px; font-weight: 600;\">{{ opt.label }}<\u002Fdiv>\n                <div style=\"font-size: 13.5px; color: #6B7585; margin-top: 2px;\">{{ opt.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top: 22px; display: flex; flex-direction: column; align-items: center; gap: 14px;\">\n        <button onclick=\"{{ onSubmit }}\" style=\"width: 100%; border: none; background: #4D74D4; color: #FFFFFF; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 17px; padding: 17px; border-radius: 14px; cursor: pointer; letter-spacing: -0.005em; transition: background .2s, transform .1s;\" style-hover=\"background: #264091;\" style-active=\"transform: scale(.99);\">Pateikti atsakymus<\u002Fbutton>\n        <p style=\"font-size: 13px; color: #6B7585; margin: 0; text-align: center;\">Atsakymus matys tik „Nuomity“ komanda<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:700,&quot;height&quot;:900},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#4D74D4&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#4D74D4&quot;,&quot;#264091&quot;,&quot;#81A0FD&quot;,&quot;#101826&quot;]}}\">\nclass Component extends DCLogic {\n  // ⬇⬇⬇ ĮDĖK ČIA savo splitforms „access key\" (iš dashboard). Kol čia YOUR_ACCESS_KEY — atsakymai nesiunčiami, tik parodomas padėkos ekranas.\n  ACCESS_KEY = '4e49d6f77ed94bc4bf9b5ece85be66b4';\n\n  state = { q1: null, q2: [], q2other: '', q3: null, q4: '', q5: [], sending: false, done: false };\n\n  toggleQ5(id) {\n    this.setState(s => ({\n      q5: s.q5.includes(id) ? s.q5.filter(x => x !== id) : [...s.q5, id]\n    }));\n  }\n\n  toggleQ2(id) {\n    this.setState(s => ({\n      q2: s.q2.includes(id) ? s.q2.filter(x => x !== id) : [...s.q2, id]\n    }));\n  }\n\n  renderVals() {\n    const accent = this.props.accentColor ?? '#4D74D4';\n    const s = this.state;\n\n    const baseRow = 'display:flex;align-items:center;gap:13px;padding:15px 16px;border-radius:14px;cursor:pointer;transition:border-color .15s,background .15s,box-shadow .15s,transform .12s;';\n    const mkRadio = (opt, sel, onClick) => {\n      const on = sel === opt.id;\n      return {\n        ...opt,\n        onClick,\n        rowStyle: baseRow + (on\n          ? `border:1.5px solid ${accent};background:#EEF3FF;box-shadow:0 2px 8px rgba(77,116,212,.20);`\n          : 'border:1.5px solid #DDE1EC;background:#FFFFFF;box-shadow:0 1px 2px rgba(38,64,145,.05),0 4px 12px rgba(38,64,145,.07);'),\n        dotStyle: `flex:0 0 auto;width:20px;height:20px;border-radius:999px;display:flex;align-items:center;justify-content:center;border:2px solid ${on ? accent : '#C4CAD4'};`,\n        dotInner: on ? `width:10px;height:10px;border-radius:999px;background:${accent};` : 'width:0;height:0;'\n      };\n    };\n\n    const q1data = [\n      { id: 'm1', label: 'Per pastarąjį mėnesį' },\n      { id: 'm3', label: 'Prieš 1–3 mėnesius' },\n      { id: 'm12', label: 'Prieš 3–12 mėnesių' },\n      { id: 'y1', label: 'Prieš daugiau nei metus' },\n      { id: 'never', label: 'Dar niekada nesu nuomojęs (tik planuoju)' },\n    ];\n    const q2data = [\n      { id: 'listing', label: 'Skelbimo paruošimas ir publikavimas' },\n      { id: 'inquiries', label: 'Susidomėjusiųjų srautas ir susirašinėjimas' },\n      { id: 'apps', label: 'Paraiškų rinkimas' },\n      { id: 'compare', label: 'Kandidatų palyginimas' },\n      { id: 'solvency', label: 'Kandidato mokumo įvertinimas' },\n      { id: 'trust', label: 'Kandidato patikimumo įvertinimas' },\n      { id: 'viewings', label: 'Apžiūrų laikų derinimas' },\n      { id: 'contract_prep', label: 'Nuomos sutarties parengimas' },\n      { id: 'contract_sign', label: 'Sutarties pasirašymas' },\n      { id: 'other', label: 'Kita' },\n    ];\n    const q5data = [\n      { id: 'beta', label: 'Noriu išbandyti beta versiją', sub: 'Galėsi testuoti funkcijas vienas pirmųjų' },\n      { id: 'interview', label: 'Sutinku 15 min. pasikalbėti', sub: 'Trumpas skambutis patogiu laiku' },\n      { id: 'updates', label: 'Kol kas tik norėčiau gauti naujienas', sub: 'Be jokių įsipareigojimų' },\n    ];\n\n    const q1opts = q1data.map(o => mkRadio(o, s.q1, () => this.setState({ q1: o.id })));\n    const q2opts = q2data.map(o => {\n      const on = s.q2.includes(o.id);\n      return {\n        ...o,\n        onClick: () => this.toggleQ2(o.id),\n        rowStyle: baseRow + (on ? `border:1.5px solid ${accent};background:#EEF3FF;box-shadow:0 2px 8px rgba(77,116,212,.20);` : 'border:1.5px solid #DDE1EC;background:#FFFFFF;box-shadow:0 1px 2px rgba(38,64,145,.05),0 4px 12px rgba(38,64,145,.07);'),\n        boxStyle: `flex:0 0 auto;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:all .15s;` +\n          (on ? `background:${accent};border:2px solid ${accent};` : 'background:#fff;border:2px solid #C4CAD4;'),\n        checkStyle: on ? 'display:flex;' : 'display:none;'\n      };\n    });\n\n    const q3opts = [1, 2, 3, 4, 5].map(n => {\n      const on = s.q3 === n;\n      return {\n        n,\n        onClick: () => this.setState({ q3: n }),\n        cellStyle: `flex:1;text-align:center;padding:16px 0;border-radius:12px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:19px;transition:all .15s;` +\n          (on ? `background:${accent};color:#FFFFFF;border:1.5px solid ${accent};` : 'background:#FBFBF9;color:#101826;border:1.5px solid #E7E8E6;')\n      };\n    });\n\n    const q5opts = q5data.map(o => {\n      const on = s.q5.includes(o.id);\n      return {\n        ...o,\n        onClick: () => this.toggleQ5(o.id),\n        rowStyle: 'display:flex;align-items:flex-start;gap:13px;padding:16px;border-radius:14px;cursor:pointer;transition:border-color .15s,background .15s,box-shadow .15s,transform .12s;' +\n          (on ? `border:1.5px solid ${accent};background:#EEF3FF;box-shadow:0 2px 8px rgba(77,116,212,.20);` : 'border:1.5px solid #DDE1EC;background:#FFFFFF;box-shadow:0 1px 2px rgba(38,64,145,.05),0 4px 12px rgba(38,64,145,.07);'),\n        boxStyle: `flex:0 0 auto;margin-top:1px;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:all .15s;` +\n          (on ? `background:${accent};border:2px solid ${accent};` : 'background:#fff;border:2px solid #C4CAD4;'),\n        checkStyle: on ? 'display:flex;' : 'display:none;'\n      };\n    });\n\n    const answered = [\n      s.q1 != null,\n      s.q2.length > 0,\n      s.q3 != null,\n      s.q4.trim().length > 0,\n      s.q5.length > 0,\n    ].filter(Boolean).length;\n\n    return {\n      q1opts, q2opts, q3opts, q5opts,\n      q4: s.q4,\n      onQ4: (e) => this.setState({ q4: e.target.value }),\n      showQ2other: s.q2.includes('other'),\n      q2other: s.q2other,\n      onQ2other: (e) => this.setState({ q2other: e.target.value }),\n      done: s.done,\n      active: !s.done,\n      answeredCount: answered,\n      progressPct: (answered / 5 * 100) + '%',\n      sending: s.sending,\n      onSubmit: async () => {\n        if (s.sending) return;\n        const labelOf = (arr, id) => (arr.find(o => o.id === id) || {}).label || '';\n        const q2label = s.q2.map(id => id === 'other'\n          ? ('Kita: ' + (s.q2other || '').trim())\n          : labelOf(q2data, id)).join('; ');\n        const email = new URLSearchParams(window.location.search).get('email') || '';\n        const payload = {\n          'El. paštas': email,\n          '1. Kada paskutinį kartą ieškojo nuomininko': labelOf(q1data, s.q1),\n          '2. Sunkiausia proceso dalis': q2label,\n          '3. Pasitikėjimas renkantis nuomininką (1-5)': s.q3 != null ? String(s.q3) : '',\n          '4. Ką pakeistų nuomos procese': s.q4.trim(),\n          '5. Kaip nori prisidėti': s.q5.map(id => labelOf(q5data, id)).join(', '),\n        };\n        this.setState({ sending: true });\n        if (this.ACCESS_KEY && this.ACCESS_KEY !== 'YOUR_ACCESS_KEY') {\n          try {\n            const fd = new FormData();\n            fd.append('access_key', this.ACCESS_KEY);\n            fd.append('subject', 'Nauja Nuomity apklausa — ' + (email || 'be email'));\n            Object.entries(payload).forEach(([k, v]) => fd.append(k, v));\n            await fetch('https://splitforms.com/api/submit', { method: 'POST', body: fd });\n          } catch (e) { /* tyliai — vis tiek parodom padėką */ }\n        }\n        this.setState({ sending: false, done: true });\n        try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) {}\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
